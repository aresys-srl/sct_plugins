name: sct-iceye-reader

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "sct-iceye-reader-v*"
    paths:
      - ".github/workflows/iceye.yml"
      - "sct_iceye_reader/**"
      - "nox_common.py"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/iceye.yml"
      - "sct_iceye_reader/**"
      - "nox_common.py"

jobs:
  analysis:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        task:
          - check_format
          - pylint

    defaults:
      run:
        working-directory: sct_iceye_reader

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s ${{ matrix.task }}

  unittest_linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        working-directory: sct_iceye_reader

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Select Python ${{ matrix.python }}
        run: |
          case "${{ matrix.python }}" in
            3.11) echo "/opt/python/cp311-cp311/bin" >> $GITHUB_PATH ;;
            3.12) echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH ;;
            3.13) echo "/opt/python/cp313-cp313/bin" >> $GITHUB_PATH ;;
            3.14) echo "/opt/python/cp314-cp314/bin" >> $GITHUB_PATH ;;
          esac

      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s pytest -p ${{ matrix.python }}
      - name: Upload junit and coverage
        uses: actions/upload-artifact@v5
        with:
          name: linux-test-${{ matrix.python }}
          path: |
            sct_iceye_reader/_build/pytest-report-*.xml
            sct_iceye_reader/_build/pytest-coverage-*.xml
          retention-days: 14

  unittest_windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        working-directory: sct_iceye_reader

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s pytest -p ${{ matrix.python }}
      - name: Upload junit and coverage
        uses: actions/upload-artifact@v5
        with:
          name: windows-test-${{ matrix.python }}
          path: |
            sct_iceye_reader/_build/pytest-report-*.xml
            sct_iceye_reader/_build/pytest-coverage-*.xml
          retention-days: 14

  sdist:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: sct_iceye_reader

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: sct_iceye_reader/dist/*.tar.gz
          retention-days: 14

  wheel:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    defaults:
      run:
        working-directory: sct_iceye_reader

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_wheel

      - uses: actions/upload-artifact@v5
        with:
          name: wheel
          path: sct_iceye_reader/dist/*.whl
          retention-days: 14

  publish:
    needs:
      [analysis, unittest_linux, unittest_windows, sdist, wheel]
    if: startsWith(github.ref_name, 'sct-iceye-reader-v')

    runs-on: ubuntu-latest

    environment: pypi-sct-iceye-reader

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Clean dist
        run: |
          find dist -type f ! -name "*.whl" ! -name "*.tar.gz" -delete

      - name: Show artifacts
        run: |
          find dist -type f -maxdepth 2

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
